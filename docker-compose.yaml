version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timesheet_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./Timesheet.Api
      dockerfile: Timesheet.Web/Dockerfile
      target: build
    container_name: timesheet_backend
    volumes:
      - ./Timesheet.Api:/src
    working_dir: /src/Timesheet.Web
    command: dotnet watch run --urls http://0.0.0.0:8080
    env_file:
      - ./Timesheet.Api/.env
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    ports:
      - "5000:8080"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./Timesheet.Ui
      dockerfile: Dockerfile
      target: build
    container_name: timesheet_frontend 
    volumes:
      - ./Timesheet.Ui:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: