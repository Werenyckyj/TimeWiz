server {
    listen 80;
    server_name localhost;

    # 1. Servírování tvé React/Vite aplikace
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # Nutné pro fungování React Routeru
    }

    # 2. Přesměrování API na backend kontejner
    location /api/ {
        # 'timesheet_backend' musí být jméno tvé backend služby nebo kontejneru v docker-compose!
        # Port 8080 je ten, který tvůj backend vystavuje (viděli jsme to v logu)
        proxy_pass http://timesheet_backend:8080/api/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}